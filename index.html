<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typewriter</title>
<style>
html, body { margin: 0; padding: 0; font-family: "Times New Roman", serif; }
#typewriter { font-size: 20px; line-height: 1.4; padding: 0 12px; }
</style>
</head>
<body>
<div id="typewriter"></div>
<script>
const text = `The year after 9/11 I started commuting alone to middle school in Times Square. I was anxious there would be a terrorist attack, but I could calm myself down by finding at least one exceptionally attractive person on the train. I sensed that someone who was very good looking wouldn't die in a mass tragedy because they were the protagonist and worthy of an individual death. I must have thought: if this were a movie, the plot would depend on their continuity. It didn't occur to me that they could be the only person to survive. The idea of destiny persists as a form of privilege, which appears to unevenly distribute chance according to a hierarchy of values. That's what Kanye West meant I think when he said he needed more money to protect his daughter. People were outraged because he is already very rich, but I think he was articulating a logic by which money protects you not only from need but from fate: the negative image of destiny. Based on recent events it would not be incorrect to think that lots of money grants you legal impunity. But only an infinite sum would be enough to account for all the chance in the world. Not only fate in the eyes of the law but destiny in the eyes of society retains a causal relationship to character. Character in this case means wealth and beauty rather than virtue, and destiny is to some extent synonymous with fame. My narrative model as a kid was obviously TV and movies. Unlike God, who could know one's moral intention, or the novel, which gives us access to inner life, moving images are made up of external signs. Every movie makes some conjecture about why things happen the way they happen and not some other way. The proportion of need to intention to chance is both historically specific and unanswerable. In a text exchange Bill told me that the etymology of "weird" is destiny. I found this interesting because it links two historically distinct conceptions of the world. When we say weird — someone crosses your mind right before running into them — we are overwhelmed by something that has no discernible causality but seems too meaningful to be chance. As though chance and destiny are the two extreme ends of our intention, which fold over and converge. We have a quotient in our head for how much chance we will accept, and when there is an overflow we make up for the difference with a shrug that secretly reaches eternity. But in this case the righteous circle of eternity seems like a defense mechanism against the possibility of non-meaning. The other important thing about movies is that they end. Only from this vantage point can signs, which happen in the present, be understood. Eight billion people can't possibly have an individual destiny because only after death can the movie be edited and a final judgment made. Eight billion movies would go on forever and there would be no one to watch. Realism, because it focuses on everyday people, seems to imply that this is possible. People with greater privilege are encouraged to sacrifice time from their narrative time in order to witness the distant suffering of others. In Borges' story "The Lottery in Babylon," there is a governing body called "the company" which determines the lives of its constituents through chance drawings. One day someone is king and the next day they are a beggar. This way there are no chance inequities because all inequities are definitively chance. In the story, the company has to make more and more lottery drawings to account for the exponential outcomes of each previous result. But unlike the multiplication of biographical destinies, the true extent of chance would not unfold over an unbearably long time but rather through its infinitesimal division. Inside of time, Borges says, is every potential outcome of every drawing. Imagine a movie in which the intervals were so infinitesimally small that the infinite scale of chance became apparent. One outcome of the infinite possible outcomes would be utopia: a world in which need was finally eliminated. I've often thought that under communism the inequities of chance would become even more painful and pronounced. Charisma, for instance, can't be distributed equally. Instead of genetic engineering, a culture might evolve to convert chance into intention, not unlike modern art. But art as a category would no longer exist because it would simply be a way of life. `;

const el = document.getElementById("typewriter");
const restartDelay = 20 * 1000;
const vh = window.innerHeight;
const chunk = Math.round(vh * 0.4);
const trigger = Math.round(vh * 0.35);

// Pre-measure full text height
el.style.visibility = "hidden";
el.textContent = text;
const fullHeight = el.offsetHeight;
el.textContent = "";
el.style.visibility = "visible";

const totalScroll = Math.max(0, fullHeight - vh);

// Set min-height so page is always exactly fullHeight — no padding, no gap
el.style.minHeight = fullHeight + "px";

let currentScroll = 0;
let i = 0;
let canScroll = true;
let userScrolled = false;
let scrollTimeout = null;

window.addEventListener("scroll", function () {
  if (window.scrollY < (window._lastAuto || 0) - 80) {
    userScrolled = true;
    clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => { userScrolled = false; }, 3000);
  }
}, { passive: true });

function maybeScroll() {
  if (userScrolled || !canScroll) return;
  if (currentScroll >= totalScroll) return;
  // measure text bottom excluding padding
  const textBottom = el.getBoundingClientRect().bottom;
  const spaceBelow = vh - textBottom;
  if (spaceBelow < trigger) {
    const remaining = totalScroll - currentScroll;
    const move = Math.min(chunk, remaining);
    if (move <= 0) return;
    currentScroll += move;
    canScroll = false;
    window._lastAuto = currentScroll;
    window.scrollTo({ top: currentScroll, behavior: "smooth" });
    setTimeout(() => { canScroll = true; }, 520);
  }
}

function type() {
  if (i < text.length) {
    el.textContent += text[i];
    i++;
    maybeScroll();
    setTimeout(type, 43);
  } else {
    setTimeout(restart, restartDelay);
  }
}

function restart() {
  el.textContent = "";
  currentScroll = 0;
  i = 0;
  canScroll = true;
  userScrolled = false;
  window._lastAuto = 0;
  window.scrollTo(0, 0);
  setTimeout(type, 800);
}

type();
</script>
</body>
</html>
