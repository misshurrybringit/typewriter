<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typewriter</title>
<style>
html, body { margin: 0; padding: 0; font-family: "Times New Roman", serif; }
#stage {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
  box-sizing: border-box;
  touch-action: none;
}
#inner {
  position: absolute;
  top: 0; left: 12px; right: 12px;
  font-size: 20px;
  line-height: 1.4;
}
</style>
</head>
<body>
<div id="stage"><div id="inner"></div></div>
<script>
const text = `The year after 9/11 I started commuting alone to middle school in Times Square. I was anxious there would be a terrorist attack, but I could calm myself down by finding at least one exceptionally attractive person on the train. I sensed that someone who was very good looking wouldn't die in a mass tragedy because they were the protagonist. I must have thought, if this were a movie, the plot would depend on them. It didn't occur to me that they could be the only person to survive. The idea of destiny persists as a form of privilege, which appears to unevenly distribute chance according to a hierarchy of values. That's what Kanye West meant, I think, when he said "I need more money to protect my daughter." People were outraged because he was already very rich, but I think he was articulating a logic by which money protects you not only from need but from fate: the negative image of destiny. The governing body of fate is now the law and it would not be incorrect to assume, at least in this country, that lots of money grants you impunity. But only an infinite sum would be enough to account for all the chance in the world. Not only fate in the eyes of the law, but destiny in the eyes of society, retains a causal relationship to character. Character in this case means wealth and beauty rather than virtue, and destiny is to some extent synonymous with fame. My narrative model as a kid was obviously based on TV and movies. Unlike God, who knows one's moral intention, or the novel, which gives us access to inner life, moving images are made up of external signs. Every movie makes some conjecture about why things happen the way they happen and not some other way. The distribution of need, intention, and chance is both historically specific and unanswerable. In a text exchange, Bill told me that the etymology of "weird" is destiny. I found this interesting because it links two historically distinct conceptions of the world. When something "weird" happens, for instance you think of someone and then run into them, you are overwhelmed by an event that has no discernible causality but seems too meaningful to be chance. As though chance and destiny are the two extreme ends of our intention, which fold over and converge. We have a quotient in our heads for how much chance we will accept, and when there is an overflow we make up the difference with a shrug that secretly reaches back to a different world order when destiny existed and time was a circle. The other important thing about movies is that they end. Only from this vantage point can signs, which happen in the present, be understood. Only after death can the movie be edited, the judgment made. How can everyone have a destiny if eight billion movies would go on forever and there would be no one to watch. The genre of realism seems to promise narrative relevance to ordinary people. Those with greater privilege are encouraged by society to sacrifice their narrative time in order to witness the distant suffering of others. In Borges' story "The Lottery in Babylon," there is a governing body called "the company" which determines the lives of its constituents through chance drawings. One day someone is king and the next day they are a beggar. In this world, inequality is not eliminated but transformed into an organized game of chance. As time goes on the company has to make more and more lottery drawings to account for the exponential outcomes of each previous result. But unlike the multiplication of narrative destiny, the true extent of chance would not unfold over an unbearably long time but rather in its infinitesimal division. Inside of time, Borges says, is every potential outcome of every drawing. Imagine a movie in which the intervals between frames were so infinitesimally small that the scale of chance became apparent. One outcome is a world in which need is finally eliminated. If this happened the inequalities of chance might become even more painful and pronounced. Instead of genetically engineering a homogenous society, a culture might evolve to convert chance into intention like modern art. But art as a category would no longer exist because it would simply be a way of life.`;

const inner = document.getElementById("inner");
const restartDelay = 30 * 1000;

let currentShift = 0;
let autoShift = 0;
let typed = "";
let i = 0;
let canScroll = true;
let userScrolled = false;
let userScrollTimeout = null;
let touchStartY = 0;

// Measure total shift needed for full text — cached, only recalculated on resize
let cachedTotalShift = 0;
function measureTotalShift() {
  const savedTransform = inner.style.transform;
  const savedText = inner.textContent;
  inner.style.transition = "none";
  inner.style.transform = "translateY(0)";
  inner.style.visibility = "hidden";
  inner.textContent = text;
  const fullHeight = inner.offsetHeight;
  inner.textContent = savedText;
  inner.style.transform = savedTransform;
  inner.style.visibility = "visible";
  cachedTotalShift = Math.max(0, fullHeight - window.innerHeight);
}
measureTotalShift();
window.addEventListener("resize", measureTotalShift);

function setUserScrolled() {
  userScrolled = true;
  clearTimeout(userScrollTimeout);
  userScrollTimeout = setTimeout(() => { userScrolled = false; }, 5000);
}

window.addEventListener("wheel", (e) => {
  const newShift = Math.min(cachedTotalShift, Math.max(0, currentShift + e.deltaY * 0.5));
  if (newShift < autoShift) setUserScrolled();
  else userScrolled = false;
  currentShift = newShift;
  inner.style.transition = "none";
  inner.style.transform = `translateY(-${currentShift}px)`;
}, { passive: true });

const stage = document.getElementById("stage");

stage.addEventListener("touchstart", (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: false });

stage.addEventListener("touchmove", (e) => {
  e.preventDefault();
  const delta = touchStartY - e.touches[0].clientY;
  touchStartY = e.touches[0].clientY;
  const newShift = Math.min(cachedTotalShift, Math.max(0, currentShift + delta));
  if (newShift < autoShift) setUserScrolled();
  else userScrolled = false;
  currentShift = newShift;
  inner.style.transition = "none";
  inner.style.transform = `translateY(-${currentShift}px)`;
}, { passive: false });

function maybeScroll() {
  if (!canScroll || userScrolled) return;
  if (currentShift >= cachedTotalShift) return;
  const textBottom = inner.getBoundingClientRect().bottom;
  const vh = window.innerHeight;
  if (textBottom < vh * 0.5) return;
  const spaceBelow = vh - textBottom;
  if (spaceBelow < vh * 0.35) {
    const remaining = cachedTotalShift - currentShift;
    const move = Math.min(Math.round(vh * 0.4), remaining);
    if (move <= 0) return;
    currentShift += move;
    autoShift = currentShift;
    canScroll = false;
    inner.style.transition = "transform 0.5s ease";
    inner.style.transform = `translateY(-${currentShift}px)`;
    setTimeout(() => { canScroll = true; }, 520);
  }
}

function type() {
  if (i < text.length) {
    typed += text[i];
    inner.textContent = typed;
    i++;
    maybeScroll();
    setTimeout(type, 77);
  } else {
    if (cachedTotalShift > currentShift) {
      currentShift = cachedTotalShift;
      autoShift = currentShift;
      inner.style.transition = "transform 0.5s ease";
      inner.style.transform = `translateY(-${currentShift}px)`;
    }
    setTimeout(restart, restartDelay);
  }
}

function restart() {
  typed = "";
  inner.textContent = "";
  inner.style.transition = "none";
  inner.style.transform = "translateY(0)";
  autoShift = 0;
  currentShift = 0;
  i = 0;
  canScroll = true;
  userScrolled = false;
  setTimeout(type, 800);
}

type();
</script>
</body>
</html>
